<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة وإنشاء البطاقات</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
            font-size: 1.8rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        /* قسم التحكم والبيانات */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input, .input-group textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
        }

        .bot-settings {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed var(--border);
            margin-top: 10px;
        }

        .bot-settings-title {
            font-size: 0.95rem;
            color: #38bdf8;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* الأزرار */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        /* معاينة البطاقة */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 380px;
            height: 230px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تأثير اللمعان خلف البطاقة */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }

        .logo-container {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-body {
            z-index: 1;
            margin-top: 10px;
        }

        .card-number-display {
            font-size: 1.4rem;
            letter-spacing: 2px;
            font-family: monospace;
            color: #f1f5f9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 1;
        }

        .card-holder {
            display: flex;
            flex-direction: column;
        }

        .card-holder .label {
            font-size: 0.75rem;
            color: #cbd5e1;
            text-transform: uppercase;
        }

        .card-holder .name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
        }

        .card-details {
            font-size: 0.8rem;
            color: #e2e8f0;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💳 نظام إدارة وإنشاء البطاقات الذكي</h2>
    
    <div class="layout">
        <div class="form-section">
            <div class="input-group">
                <label for="fullName">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل اسم صاحب البطاقة" oninput="updatePreview()">
            </div>

            <div class="input-group">
                <label for="cardNumber">رقم البطاقة</label>
                <input type="text" id="cardNumber" placeholder="مثال: 4520 8596 1234" oninput="updatePreview()">
            </div>

            <div class="input-group">
                <label for="cardDetails">ملاحظات / تفاصيل إضافية</label>
                <textarea id="cardDetails" rows="2" placeholder="أي بيانات أو ملاحظات أخرى للبطاقة" oninput="updatePreview()"></textarea>
            </div>

            <div class="bot-settings">
                <div class="bot-settings-title">💬 إعدادات الإرسال وبوت تليجرام</div>
                <div class="input-group" style="margin-bottom: 10px;">
                    <label for="botToken">توكن البوت (Bot Token)</label>
                    <input type="password" id="botToken" placeholder="أدخل توكن البوت هنا" onchange="saveSettings()">
                </div>
                <div class="input-group">
                    <label for="chatId">ايدي الدردشة (Chat ID)</label>
                    <input type="text" id="chatId" placeholder="أدخل الايدي الخاص بك" onchange="saveSettings()">
                </div>
            </div>

            <button class="btn btn-primary" onclick="generateAndSend()">🚀 إنشاء وإرسال البطاقة للبوت</button>
            
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">
                📥 استعادة للتعديل من ملف
            </button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="handleFileImport(event)">
        </div>

        <div class="preview-section">
            <h3 style="color: var(--text-muted); font-size: 1rem;">معاينة حية للبطاقة قبل الإرسال</h3>
            
            <div class="card" id="myCard">
                <div class="card-header">
                    <div class="logo-container">
                        <img class="card-logo" src="./logo1.png" alt="الشعار 1" onerror="showDefaultLogo(this)">
                    </div>
                    <div class="logo-container">
                        <img class="card-logo" src="./logo2.png" alt="الشعار 2" onerror="showDefaultLogo(this)">
                    </div>
                </div>
                
                <div class="card-body">
                    <div class="card-number-display" id="previewNumber">•••• •••• •••• ••••</div>
                </div>
                
                <div class="card-footer">
                    <div class="card-holder">
                        <span class="label">صاحب البطاقة</span>
                        <span class="name" id="previewName">الاسم الكامل يظهر هنا</span>
                    </div>
                    <div class="card-details" id="previewDetails">التفاصيل</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // عند تحميل الصفحة، استعد قيم التوكن والايدي المحفوظة سابقاً
    document.addEventListener('DOMContentLoaded', () => {
        const savedToken = localStorage.getItem('botToken');
        const savedChatId = localStorage.getItem('chatId');
        if (savedToken) document.getElementById('botToken').value = savedToken;
        if (savedChatId) document.getElementById('chatId').value = savedChatId;
        updatePreview();
    });

    // حفظ الإعدادات في متصفح المستخدم تلقائياً عند تعديلها
    function saveSettings() {
        const token = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();
        localStorage.setItem('botToken', token);
        localStorage.setItem('chatId', chatId);
    }

    // تحديث معاينة البطاقة حياً أثناء الكتابة
    function updatePreview() {
        const name = document.getElementById('fullName').value.trim();
        const num = document.getElementById('cardNumber').value.trim();
        const details = document.getElementById('cardDetails').value.trim();

        document.getElementById('previewName').innerText = name || "الاسم الكامل يظهر هنا";
        document.getElementById('previewNumber').innerText = num || "•••• •••• •••• ••••";
        document.getElementById('previewDetails').innerText = details || "التفاصيل";
    }

    // شعار افتراضي أنيق في حال لم يتم رفع logo1 أو logo2 بعد في مستودع GitHub
    function showDefaultLogo(imgElement) {
        imgElement.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;
        imgElement.style.opacity = '0.7';
    }

    // إرسال البيانات كنسخة احتياطية تليجرام
    async function generateAndSend() {
        const name = document.getElementById('fullName').value.trim();
        const num = document.getElementById('cardNumber').value.trim();
        const details = document.getElementById('cardDetails').value.trim();
        const token = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();

        if (!name || !num) {
            alert('الرجاء تعبئة حقول "الاسم الكامل" و "رقم البطاقة" أولاً.');
            return;
        }

        if (!token || !chatId) {
            alert('يرجى ملء بيانات "توكن البوت" و "ايدي الدردشة" للتمكن من إرسال النسخة الاحتياطية.');
            return;
        }

        // حفظ التوكن والايدي
        saveSettings();

        // تجميع كائن البيانات للبطاقة
        const cardData = {
            fullName: name,
            cardNumber: num,
            cardDetails: details,
            createdAt: new Date().toLocaleString('ar-EG')
        };

        // إرسال النسخة عبر تليجرام كملف JSON لتسهيل استعادتها وتعديلها
        const fileName = `${num}_${name}.json`;
        const blob = new Blob([JSON.stringify(cardData, null, 2)], { type: 'application/json' });
        
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('document', blob, fileName);
        formData.append('caption', `💳 تم حفظ نسخة احتياطية للبطاقة:\n👤 الاسم: ${name}\n🔢 الرقم: ${num}\n📅 التاريخ: ${cardData.createdAt}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert(`✨ تم إنشاء البطاقة وإرسال النسخة الاحتياطية بنجاح إلى البوت باسم:\n[ ${fileName} ]`);
            } else {
                const errResult = await response.json();
                alert(`⚠️ فشل إرسال النسخة الاحتياطية: ${errResult.description}`);
            }
        } catch (error) {
            alert('❌ حدث خطأ في الشبكة أثناء محاولة الاتصال بتليجرام.');
            console.error(error);
        }
    }

    // معالجة ملف الاسترداد وإعادة ملء الخانات للتعديل
    function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.fullName && data.cardNumber) {
                    document.getElementById('fullName').value = data.fullName;
                    document.getElementById('cardNumber').value = data.cardNumber;
                    document.getElementById('cardDetails').value = data.cardDetails || "";
                    
                    updatePreview();
                    alert('✅ تم استيراد بيانات البطاقة بنجاح من الملف وجاهزة للتعديل!');
                } else {
                    alert('⚠️ تنسيق الملف المستورد غير صحيح أو لا يحتوي على الحقول الأساسية.');
                }
            } catch (err) {
                alert('❌ فشل قراءة الملف. الرجاء التأكد من رفع ملف بصيغة JSON صحيحة.');
            }
        };
        reader.readAsText(file);
        // تصفير مدخل الملف ليتمكن المستخدم من إعادة استيراده لاحقاً مجدداً
        event.target.value = '';
    }
</script>

</body>
</html>
